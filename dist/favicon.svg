<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Black background -->
  <rect width="32" height="32" fill="#0a0a0a"/>

  <!-- Film frame corners (top-left) -->
  <rect x="2" y="2" width="5" height="2" fill="#FF4A1C"/>
  <rect x="2" y="2" width="2" height="5" fill="#FF4A1C"/>
  <!-- top-right -->
  <rect x="25" y="2" width="5" height="2" fill="#FF4A1C"/>
  <rect x="28" y="2" width="2" height="5" fill="#FF4A1C"/>
  <!-- bottom-left -->
  <rect x="2" y="28" width="5" height="2" fill="#FF4A1C"/>
  <rect x="2" y="25" width="2" height="5" fill="#FF4A1C"/>
  <!-- bottom-right -->
  <rect x="25" y="28" width="5" height="2" fill="#FF4A1C"/>
  <rect x="28" y="25" width="2" height="5" fill="#FF4A1C"/>

  <!-- Diagonal "cut" slash — the brand mark -->
  <line x1="8" y1="24" x2="24" y2="8" stroke="#FF4A1C" stroke-width="2.5" stroke-linecap="square"/>

  <!-- RC lettermark -->
  <text x="4" y="21" font-family="Arial, sans-serif" font-weight="900" font-size="11" fill="#ffffff" letter-spacing="-1">RC</text>
</svg>